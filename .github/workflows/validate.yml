name: Validate static app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check app.js
      - run: test -s index.html && test -s styles.css && test -s vercel.json
